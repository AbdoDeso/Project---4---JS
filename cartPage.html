<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>cartPage</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
<div class="min-h-screen bg-gray-100 ">
   <header class="fixed w-full z-200">
        <div class=" p-4 bg-gray-200  shadow-xl">
             <nav class="container flex flex-row mx-auto gap-x-3 justify-between items-center">
                <div class="flex flex-row text-center gap-x-3 items-center">
                    <h1 class=" hover:scale-108 transition duration-300"><a class="font-bold text-xs md:text-base lg:text-xl text-gray-700 
                         outline-6 outline-gray-700 hover:outline-gray-200 transition duration-300 p-2 mr-4 " href="index.html">DigitalPro</a></h1>
                  <h2 class=" hidden md:flex w-50 "><a class="text-center font-bold text-xs md:text-base cursor-pointer border-y-3
                     text-gray-800 font-bold rounded-lg  hover:scale-108 transition duration-300">Mobile Store</a> </h2>
                </div>
                </div>
    
    
                <div class="flex flex-wrap text-center justify-center mx-auto mt-2 ">
                    <ul class="flex flex-row gap-5 mb-[-20px] font-bold ml-15 sm:ml-73 md:ml-57 lg:ml-110 xl:ml-180" id="user_info">
                        <li> 
                            <a id="link1" class="relative group  font-bold  text-white border border-2 p-2" href="login.html">
                                Login
                            <span class="absolute inset-0 border-b-2 origin-left-right z-1 
                            scale-0 transition-transform duration-300 ease-in-out group-hover:scale-100"></span>
                            </a>
                        </li>
                       <li>
                         <a id="link2" class="relative group w-10 font-bold text-white border border-2 p-2" href="register.html">
                            Signup
                            <span class="absolute inset-0 border-b-2 origin-left-right z-1 
                                scale-0 transition-transform duration-300 ease-in-out group-hover:scale-100"></span>                        
                        </a>
                       </li>
                    </ul>
                      <ul class="flex flex-row gap-3 font-bold ml-0 sm:ml-73 md:ml-57 lg:ml-110 xl:ml-180" id="user_info">
                        <li>
                            <a class="relative group 
                             font-bold text-gray-700  cursor-pointer transition duration-300" id="user">
                             <span class="absolute inset-0 border-b-3 origin-left-right z-1 top-6
                            scale-0 transition-transform duration-300 ease-in-out group-hover:scale-100"></span>
                            </a>
                        </li>
                        <li class="relative">
                                <a id="showCartIcon" class="hidden relative  cursor-pointer">
                                    <i class="relative text-2xl text-blue-800 transition duration-300  fas fa-shopping-cart"></i>
                                    <span id="itemsCount" class="absolute bg-red-600 rounded-full px-1 ml-[-17px] mt-[-10px] text-xs "></span>                             
                                </a>
                            <div id="cartSpace" class="hidden  h-auto absolute   mt-3 right-[-100px]
                            transition-opacity duration-500 bg-gray-200 border-2 border-gray-300 text-black rounded-sm">
                                <div>
                                    <p class="w-30 mt-2 rounded-3xl mx-auto p-2 bg-gray-900 text-white">Cart List</p>
                                    <div id="itemSpace" class="w-50 h-33 sm:h-30 md:h-25 lg:h-55 overflow-y-scroll scrollbar-thumb-gray-800 scrollbar-thin mb-2"></div>
                                </div>
                                <a class="" href="cartPage.html"><button class=" cursor-pointer bg-gray-900 text-gray-100 text-sm p-2 my-4 rounded-2xl" >View All Products</button></a>
                            </div>
                        </li>
                        <li>
                            <a class="hidden relative group overflow-hidden font-bold text-red-400 border border-2 border-red-400 p-2
                              hover:cursor-pointer transition duration-300" id="logout">
                            Log Out
                            </a>
                        </li>
                      
                    </ul>
                </div>
            </nav>
        </div>
    </header>

            <section class="flex flex-wrap mx-auto  pt-30 pb-10
            justify-center items-center  min-h-screen  gap-10 " id="CartedProducts">
            </section>
            <div class="flex justify-center items-center text-2xl bg-gray-300 text-black p-3 mx-auto" >
                <span class="text-2xl font-bold text-center">Total Price : &nbsp; </span><span class="font-bold" id="totalPriceDiv"></span>
            </div>

            <section class="flex flex-col mx-auto justify-center items-center gap-23  min-h-screen">
                <a class="relative group px-10 sm:-px-20 md:px-40 mt-7 text-3xl font-bold text-gray-900 cursor-pointer transition duration-300">
                    Favorite Items
                    <span class="absolute  mx-auto w-70  pt-2 inset-0 border-b-4 origin-left-right z-1 top-10 text-red-600
                            scale-100 transition-transform duration-300 ease-in-out group-hover:scale-130"></span>
                </a>
            <div class="flex flex-wrap mx-auto  pt-3 pb-10
              gap-10 " id="favItems"></div>
            </section>
            
</div>

    <script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.slim.min.js"></script>
    <script src="js/cartPage.js"></script>
    <script src="js/user.js"></script>

</body>
</html>
