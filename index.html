<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HomePage</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
<div class="min-h-screen bg-gray-100 ">
   <header class="fixed w-full z-200">
        <div class=" p-4 bg-gray-200  shadow-xl">
             <nav class="container flex flex-row mx-auto gap-x-3 justify-between items-center">
                <div class="flex flex-row text-center gap-x-3 items-center">
                    <h1 class=" hover:scale-108 transition duration-300"><a class="font-bold text-xs md:text-base lg:text-xl text-gray-700 
                         outline-6 outline-gray-700 hover:outline-gray-200 transition duration-300 p-2 mr-4 " href="index.html">DigitalPro</a></h1>
                    <h2 class=" hidden md:flex   w-39 font-bold text-xs md:text-base lg:text-lg cursor-pointer border-y-3
                     text-gray-800 font-bold rounded-lg  hover:scale-108 transition duration-300">Marketing Agency</h2>
                </div>
    
                <div class="flex flex-wrap text-center justify-center mx-auto mt-2 ">
                    <ul class="flex flex-row gap-5 mb-[-20px] font-bold ml-15 sm:ml-73 md:ml-57 lg:ml-110 xl:ml-180" id="user_info">
                        <li> 
                            <a id="link1" class="relative group  font-bold  border border-2 p-2" href="login.html">
                                Login
                            </a>
                        </li>
                       <li>
                         <a id="link2" class="relative group w-10 font-bold  border border-2 p-2" href="register.html">
                            Signup
                        </a>
                       </li>
                    </ul>
                    <ul class="flex flex-row gap-5 font-bold ml-0 sm:ml-73 md:ml-57 lg:ml-110 xl:ml-180" id="user_info">
                        <li>
                            <a class="relative group mr-10 
                             font-bold text-gray-700  cursor-pointer transition duration-300" id="user">
                             <span class="absolute inset-0 border-b-3 origin-left-right z-1 top-6
                            scale-0 transition-transform duration-300 ease-in-out group-hover:scale-100"></span>
                            </a>
                        </li>
                        <li class="relative">
                                <a id="showCartIcon" class="hidden relative  cursor-pointer">
                                    <i class="relative text-2xl text-blue-800 transition duration-300  fas fa-shopping-cart"></i>
                                    <span id="itemsCount" class="absolute bg-red-600 rounded-full px-1 ml-[-17px] mt-[-10px] text-xs "></span>                             
                                </a>
                            <div id="cartSpace" class="hidden  h-auto absolute   mt-3 right-[-120px]
                            transition-opacity duration-500 bg-gray-200 border-2 border-gray-300 text-black rounded-sm">
                                <div>
                                    <p class="w-30 mt-2 rounded-3xl mx-auto p-2 bg-gray-900 text-white">Cart List</p>
                                    <div id="itemSpace" class="w-50 h-33 sm:h-30 md:h-25 lg:h-55 overflow-y-scroll scrollbar-thumb-gray-800 scrollbar-thin mb-2"></div>
                                </div>
                                <a class="" href="cartPage.html"><button class=" cursor-pointer bg-gray-900 text-gray-100 text-sm p-2 my-4 rounded-2xl" >View All Products</button></a>
                            </div>
                        </li>
                        <li>
                            <a class="hidden relative group overflow-hidden font-bold text-red-400 border border-2 border-red-400 p-2
                              hover:cursor-pointer transition duration-300" id="logout">
                            Log Out
                            </a>
                        </li>
                      
                    </ul>
                </div>
            </nav>
        </div>
    </header>
            <div class="flex justify-center items-center space-x-3 pt-30 lg:pt-35 xl:pt-30 pb-10  mx-auto">
                    <div>
                        <select class="bg-gray-100 p-1 mt-1 text-black text-[8px] sm:text-sm rounded-sm" name="" id="type">
                            <option value="title" selected>Search By Product Name</option>
                            <option value="color" >Search By Category</option>
                        </select>
                    </div>
                    <input class=" w-30 sm:w-60 lg:w-80 xl:w-80 p-1 bg-gray-200 pl-3 text-gray-800 rounded-xl 
                        placeholder:text-gray-700 placeholder:text-sm outline-gray-500" 
                        type="search" name="filterItems" id="filter" placeholder="Find Items">
                    <button class="inline-block bg-gray-600 text-gray-200 px-2 py-1 font-bold rounded-lg" >Search</button>
            </div>
            <section class="flex flex-wrap mx-auto  pt-3 pb-10
            justify-center items-center  min-h-screen  gap-10 " id="products">
            </section>
</div>

    <script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.slim.min.js"></script>
    <script src="js/products.js"></script>
    <script src="js/main.js"></script>
    <script src="js/user.js"></script>
</body>
</html>
